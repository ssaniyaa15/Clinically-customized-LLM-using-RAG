apiVersion: apps/v1
kind: Deployment
metadata:
  name: amca-web
  namespace: amca
  labels:
    app.kubernetes.io/name: amca-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: amca-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amca-web
    spec:
      containers:
        - name: web
          image: ghcr.io/example/amca-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: amca-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: amca-web
  namespace: amca
spec:
  selector:
    app.kubernetes.io/name: amca-web
  ports:
    - port: 3000
      targetPort: 3000
