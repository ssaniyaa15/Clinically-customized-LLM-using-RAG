apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: amca
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amca-postgres
  namespace: amca
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: amca-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amca-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: amca
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: amca-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: amca-postgres
  namespace: amca
spec:
  selector:
    app.kubernetes.io/name: amca-postgres
  ports:
    - port: 5432
      targetPort: 5432

