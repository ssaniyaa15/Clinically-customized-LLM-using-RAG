apiVersion: apps/v1
kind: Deployment
metadata:
  name: amca-api
  namespace: amca
  labels:
    app.kubernetes.io/name: amca-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: amca-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amca-api
    spec:
      containers:
        - name: api
          image: ghcr.io/example/amca-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: amca-config
            - secretRef:
                name: amca-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: amca-api
  namespace: amca
spec:
  selector:
    app.kubernetes.io/name: amca-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: amca-api-hpa
  namespace: amca
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: amca-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
