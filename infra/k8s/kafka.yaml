apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-pvc
  namespace: amca
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amca-zookeeper
  namespace: amca
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: amca-zookeeper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amca-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.6.0
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          ports:
            - containerPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: amca-zookeeper
  namespace: amca
spec:
  selector:
    app.kubernetes.io/name: amca-zookeeper
  ports:
    - port: 2181
      targetPort: 2181
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amca-kafka
  namespace: amca
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: amca-kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: amca-kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: amca-zookeeper:2181
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://amca-kafka:9092
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          ports:
            - containerPort: 9092
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
      volumes:
        - name: kafka-data
          persistentVolumeClaim:
            claimName: kafka-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: amca-kafka
  namespace: amca
spec:
  selector:
    app.kubernetes.io/name: amca-kafka
  ports:
    - port: 9092
      targetPort: 9092

