default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.4.2
    hooks:
      - id: prettier
        exclude: ^(pnpm-lock\.yaml|poetry\.lock)$

  - repo: local
    hooks:
      - id: poetry-mypy
        name: mypy (poetry)
        entry: poetry run mypy apps/api/src packages/shared-types/python packages/ml-core/src
        language: system
        types: [python]
        pass_filenames: false

      - id: eslint-web
        name: eslint (web)
        entry: pnpm --filter @amca/web exec eslint . --max-warnings 0
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false
